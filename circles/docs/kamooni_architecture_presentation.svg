
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<style>
.title { font: 700 44px Arial; fill:#111;}
.subtitle { font: 400 22px Arial; fill:#444;}
.boxTitle { font:700 22px Arial; fill:#111;}
.boxText { font:400 18px Arial; fill:#333;}
.arrow { stroke:#444; stroke-width:4; marker-end:url(#arrow); fill:none;}
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<polygon points="0 0, 10 3, 0 6" fill="#444"/>
</marker>
</defs>

<rect width="1600" height="900" fill="#f5f7fb"/>

