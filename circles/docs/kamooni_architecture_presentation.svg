<text x="850" y="285" text-anchor="middle" class="boxText">API + UI</text>
<text x="850" y="315" text-anchor="middle" class="boxText">Mongo Chat Runtime</text>

<rect x="1080" y="200" width="200" height="160" rx="20" fill="white"/>
