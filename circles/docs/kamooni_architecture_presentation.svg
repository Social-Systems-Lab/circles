<text x="1180" y="285" text-anchor="middle" class="boxText">Users</text>
<text x="1180" y="310" text-anchor="middle" class="boxText">Circles</text>
<text x="1180" y="335" text-anchor="middle" class="boxText">Chat</text>

<line x1="340" y1="280" x2="420" y2="280" class="arrow"/>
<line x1="640" y1="280" x2="720" y2="280" class="arrow"/>
<line x1="980" y1="280" x2="1080" y2="280" class="arrow"/>

<rect x="450" y="470" width="220" height="120" rx="20" fill="white"/>
<text x="560" y="520" text-anchor="middle" class="boxTitle">MinIO</text>
<text x="560" y="550" text-anchor="middle" class="boxText">Media Storage</text>

